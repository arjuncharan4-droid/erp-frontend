<!DOCTYPE html>
<html>
<head>
  <title>ERP Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family:Arial; display:flex; }
    .sidebar { width:220px; background:#1e293b; color:white; padding:20px; }
    .main { flex:1; padding:20px; background:#f1f5f9; }
    .card { background:white; padding:20px; margin:10px; border-radius:10px; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>ERP</h2>
  <p>Master</p>
  <p>Transaction</p>
  <p>Inventory</p>
  <p>Finance</p>
  <p>GST</p>
  <p>Reports</p>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div class="card">
    <h3>Total Purchase</h3>
    <h2 id="purchase">Loading...</h2>
  </div>

  <div class="card">
    <h3>Total Sales</h3>
    <h2 id="sales">Loading...</h2>
  </div>

  <canvas id="chart"></canvas>
</div>

<script>
new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: ["Jan","Feb","Mar","Apr"],
    datasets: [
      { label: "Purchase", data: [100000,120000,90000,110000] },
      { label: "Sales", data: [150000,170000,130000,180000] }
    ]
  }
});
</script>

<script>
fetch("https://erp-backend-ja45.onrender.com/dashboard")
  .then(res => res.json())
  .then(data => {
    document.getElementById("purchase").innerText = "₹" + data.totalPurchase;
    document.getElementById("sales").innerText = "₹" + data.totalSales;
  });
</script></body>
</html>
